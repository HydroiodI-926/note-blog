# Inspired from https://github.com/actions/starter-workflows/blob/main/pages/nextjs.yml
name: GitHub Pages

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Next.js 构建缓存
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm ci

      # 从笔记仓库同步内容（可选，设置 NOTES_REPO_URL 后启用）
      - name: Sync notes from external repo
        if: env.NOTES_REPO_URL != ''
        run: node scripts/sync-notes.mjs
        env:
          NOTES_REPO_URL: ${{ secrets.NOTES_REPO_URL }}
          NOTES_BRANCH: ${{ secrets.NOTES_BRANCH || 'main' }}
          NOTES_SUBDIR: ${{ secrets.NOTES_SUBDIR }}

      # rehype-mermaid 在构建期用无头浏览器把 mermaid 代码块烘成内联 SVG，
      # 必须先装 Chromium 及其系统依赖。--with-deps 会一并装好 Linux 运行库。
      - name: Install Playwright Chromium (for build-time Mermaid SVG)
        run: npx playwright-core install --with-deps chromium

      - name: Build (static export)
        run: npm run build
        env:
          # EXPORT=1 让 next.config.js 启用 output:'export'，产物输出到 ./out
          EXPORT: 1
          # UNOPTIMIZED=1：output:'export' 不支持 Next 图片优化，必须关掉
          UNOPTIMIZED: 1
          # 用户页（yourname.github.io）无需 basePath
          BASE_PATH: /note-blog
          # Giscus 评论系统配置
          NEXT_PUBLIC_GISCUS_REPO: ${{ secrets.NEXT_PUBLIC_GISCUS_REPO }}
          NEXT_PUBLIC_GISCUS_REPOSITORY_ID: ${{ secrets.NEXT_PUBLIC_GISCUS_REPOSITORY_ID }}
          NEXT_PUBLIC_GISCUS_CATEGORY: ${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY }}
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
